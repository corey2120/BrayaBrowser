<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background with gradient -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Browser window with shadow -->
  <g filter="url(#shadow)">
    <!-- Window background -->
    <rect x="96" y="120" width="320" height="280" rx="16" fill="url(#windowGradient)"/>
    
    <!-- Window header bar -->
    <rect x="96" y="120" width="320" height="48" rx="16" fill="#1e293b" opacity="0.08"/>
    <line x1="96" y1="168" x2="416" y2="168" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Traffic lights (window controls) -->
    <circle cx="120" cy="144" r="6" fill="#ef4444"/>
    <circle cx="144" cy="144" r="6" fill="#f59e0b"/>
    <circle cx="168" cy="144" r="6" fill="#10b981"/>
    
    <!-- Address bar -->
    <rect x="112" y="188" width="288" height="36" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Lock icon in address bar -->
    <circle cx="132" cy="206" r="8" fill="none" stroke="#64748b" stroke-width="2"/>
    <rect x="128" y="206" width="8" height="8" rx="2" fill="#64748b"/>
    
    <!-- URL text simulation -->
    <rect x="152" y="200" width="60" height="6" rx="3" fill="#94a3b8"/>
    <rect x="216" y="200" width="40" height="6" rx="3" fill="#cbd5e1"/>
    
    <!-- Tab representation -->
    <rect x="112" y="152" width="80" height="28" rx="8" ry="0" fill="#ffffff"/>
    <rect x="200" y="158" width="72" height="22" rx="8" ry="0" fill="#f1f5f9"/>
    
    <!-- Active tab indicator -->
    <rect x="112" y="177" width="80" height="3" rx="1.5" fill="#3b82f6"/>
    
    <!-- Content area with lines -->
    <rect x="128" y="244" width="240" height="8" rx="4" fill="#cbd5e1" opacity="0.6"/>
    <rect x="128" y="268" width="200" height="8" rx="4" fill="#cbd5e1" opacity="0.5"/>
    <rect x="128" y="292" width="220" height="8" rx="4" fill="#cbd5e1" opacity="0.4"/>
    <rect x="128" y="316" width="180" height="8" rx="4" fill="#cbd5e1" opacity="0.4"/>
    
    <!-- Stylized "B" logo overlay -->
    <g transform="translate(340, 300)">
      <!-- Circle background for B -->
      <circle cx="0" cy="0" r="48" fill="#3b82f6" opacity="0.95"/>
      <!-- Letter B -->
      <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" 
            font-size="64" font-weight="800" fill="#ffffff" 
            text-anchor="middle" letter-spacing="-2">B</text>
    </g>
  </g>
  
  <!-- Subtle highlight on top edge -->
  <path d="M 128 32 Q 256 28 384 32" stroke="#ffffff" stroke-width="2" opacity="0.3" fill="none"/>
</svg>
